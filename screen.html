<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heatwave Stage Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;cursor:none}

/* ── Couches (bas → haut) ─────────────────────────────
   1. vidéo iframe
   2. canvas
   3. flash overlay
   4. scanlines + grain
   5. vignette
   6. contenu artiste
   7. bass meter
   8. dot audio
   9. zone trigger invisible
   10. panneau contrôles
   11. splash démarrage
*/

#video-bg{position:fixed;inset:0;z-index:1;width:100%;height:100%;border:none;opacity:.32;pointer-events:none}
#video-bg.hidden{display:none}

#fx-canvas{position:fixed;inset:0;z-index:2;pointer-events:none}

#flash-overlay{position:fixed;inset:0;z-index:3;background:#fff;opacity:0;pointer-events:none;will-change:opacity}

#scanlines{
  position:fixed;inset:0;z-index:4;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.2) 2px,rgba(0,0,0,.2) 4px)
}
#grain{
  position:fixed;inset:0;z-index:5;pointer-events:none;opacity:.5;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E")
}
#vignette{
  position:fixed;inset:0;z-index:6;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 48%,rgba(0,0,0,.78) 100%);
  transition:opacity .05s
}

/* ── Contenu artiste ── */
#stage-content{
  position:fixed;inset:0;z-index:7;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none
}
#artist-logo{
  max-width:min(52vw,460px);max-height:36vh;
  object-fit:contain;display:none;
  mix-blend-mode:screen;
  transform-origin:center;
  will-change:transform,filter;
  margin-bottom:24px
}
#artist-logo.visible{display:block}
#artist-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3.5rem,13vw,12rem);
  letter-spacing:4px;line-height:.9;
  color:#fff;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
  max-width:94vw;text-align:center;
  will-change:text-shadow,letter-spacing
}
#name-bar{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);
  margin-top:14px;width:0;opacity:.4;
  transition:width .3s ease
}

/* ── Bass meter ── */
#bass-meter{position:fixed;bottom:0;left:0;right:0;height:2px;z-index:8;background:rgba(255,255,255,.04)}
#bass-fill{height:100%;width:0%;background:rgba(255,255,255,.5);box-shadow:0 0 8px rgba(255,255,255,.4);transition:width .04s linear}

/* ── Dot audio status (4px discret, bas-gauche) ── */
#audio-dot{
  position:fixed;bottom:8px;left:10px;
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.12);z-index:9;
  transition:background .2s
}
#audio-dot.active{
  background:rgba(255,255,255,.7);
  box-shadow:0 0 6px rgba(255,255,255,.5);
  animation:dotBlink .9s ease-in-out infinite alternate
}
@keyframes dotBlink{from{opacity:.4}to{opacity:1}}

/* ── Zone invisible bas-droit (trigger) ──
   120×90px, complètement invisible.
   On survole → délai 500ms → panneau apparaît.
*/
#ctrl-trigger{position:fixed;bottom:0;right:0;width:120px;height:90px;z-index:18;cursor:default}

/* ── Panneau contrôles ── */
#ctrl-panel{
  position:fixed;bottom:18px;right:18px;z-index:19;
  display:flex;flex-direction:column;gap:5px;align-items:flex-end;
  opacity:0;pointer-events:none;
  transform:translateY(8px);
  transition:opacity .22s,transform .22s
}
#ctrl-panel.visible{opacity:1;pointer-events:auto;transform:translateY(0)}
.ctrl-btn{
  background:rgba(0,0,0,.75);
  border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.45);
  padding:5px 11px;
  font-family:'Oswald',sans-serif;font-size:.58rem;
  letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition:color .15s,border-color .15s,background .15s;
  white-space:nowrap
}
.ctrl-btn:hover{color:rgba(255,255,255,.9);border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.08)}

/* ── Splash démarrage ── */
#splash{
  position:fixed;inset:0;z-index:30;
  background:rgba(0,0,0,.93);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:20px;cursor:default;
  transition:opacity .6s
}
#splash.fade-out{opacity:0;pointer-events:none}
#splash h2{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.8rem,5vw,3rem);
  letter-spacing:5px;color:rgba(255,255,255,.9);
  text-align:center;padding:0 24px
}
#splash p{
  font-family:'Oswald',sans-serif;font-size:.72rem;
  letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.32);
  text-align:center;padding:0 32px;line-height:2
}
#splash p strong{color:rgba(255,255,255,.55)}
#start-btn{
  background:#fff;color:#000;border:none;
  padding:15px 50px;
  font-family:'Bebas Neue',sans-serif;
  font-size:1.15rem;letter-spacing:5px;
  cursor:pointer;
  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  box-shadow:0 0 28px rgba(255,255,255,.18);
  transition:box-shadow .3s,transform .15s
}
#start-btn:hover{box-shadow:0 0 50px rgba(255,255,255,.45);transform:translateY(-1px)}
#start-btn:active{transform:scale(.97)}
#skip-btn{
  background:none;border:none;
  color:rgba(255,255,255,.2);
  font-family:'Oswald',sans-serif;font-size:.58rem;
  letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;padding:6px 12px;
  transition:color .2s
}
#skip-btn:hover{color:rgba(255,255,255,.45)}
#splash-err{
  font-family:'Oswald',sans-serif;font-size:.65rem;
  letter-spacing:2px;color:rgba(255,120,120,.75);
  text-align:center;padding:0 32px;display:none
}

/* ── Glitch ── */
@keyframes glitch1{
  0%,100%{clip-path:none;transform:none}
  15%{clip-path:polygon(0 20%,100% 20%,100% 36%,0 36%);transform:translateX(-5px)}
  30%{clip-path:polygon(0 62%,100% 62%,100% 78%,0 78%);transform:translateX(5px)}
  45%{clip-path:none;transform:none}
}
</style>
</head>
<body>

<iframe id="video-bg" class="hidden" allow="autoplay;encrypted-media;picture-in-picture" allowfullscreen></iframe>
<canvas id="fx-canvas"></canvas>
<div id="flash-overlay"></div>
<div id="scanlines"></div>
<div id="grain"></div>
<div id="vignette"></div>

<div id="stage-content">
  <img id="artist-logo" src="" alt="">
  <div id="artist-name">ARTISTE</div>
  <div id="name-bar"></div>
</div>

<div id="bass-meter"><div id="bass-fill"></div></div>
<div id="audio-dot"></div>

<!-- Zone invisible bas-droit → affiche les boutons -->
<div id="ctrl-trigger"></div>

<!-- Panneau contrôles (caché par défaut) -->
<div id="ctrl-panel">
  <button class="ctrl-btn" id="audio-btn" onclick="activateAudio()">⏵ ACTIVER SON</button>
  <button class="ctrl-btn" onclick="toggleFS()">⛶ PLEIN ÉCRAN</button>
  <button class="ctrl-btn" onclick="goBack()">← CONFIG</button>
</div>

<!-- Splash de démarrage -->
<div id="splash">
  <h2>ACTIVER LA DÉTECTION<br>DU SON</h2>
  <p>
    Le navigateur va demander de partager l'audio.<br>
    Sélectionne <strong>l'onglet YouTube</strong><br>
    ou <strong>Audio du système</strong> selon l'invite.
  </p>
  <button id="start-btn" onclick="activateAudio()">▶ &nbsp; ACTIVER LE SON</button>
  <button id="skip-btn" onclick="skipAudio()">Continuer sans détection sonore →</button>
  <div id="splash-err"></div>
</div>

<script>
'use strict';

/* ══════════════════════════════════════════
   CONFIG
══════════════════════════════════════════ */
const cfg  = JSON.parse(localStorage.getItem('hw_stage_config') || '{}');
const NAME = cfg.artistName  || 'ARTISTE';
const LOGO = cfg.logo        || null;
const VID  = cfg.videoInfo   || null;
const SENS = (cfg.sensitivity || 6) / 10;

/* ── Nom ─────────────────────────────────── */
const nameEl = document.getElementById('artist-name');
nameEl.textContent = NAME;
document.title = NAME + ' — Heatwave Stage';

/* ── Logo ────────────────────────────────── */
const logoEl = document.getElementById('artist-logo');
if (LOGO) { logoEl.src = LOGO; logoEl.classList.add('visible'); }

/* ── Barre sous le nom ───────────────────── */
function updateBar(){
  const bar = document.getElementById('name-bar');
  bar.style.width = Math.min(nameEl.scrollWidth, innerWidth*.88)+'px';
}
window.addEventListener('resize', updateBar);
setTimeout(updateBar, 120);

/* ── Vidéo bg ────────────────────────────── */
const vFrame = document.getElementById('video-bg');
if (VID) {
  let url = '';
  if (VID.type === 'youtube')
    url = `https://www.youtube.com/embed/${VID.id}?autoplay=1&mute=0&loop=1&playlist=${VID.id}&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3`;
  else if (VID.type === 'twitch') {
    const par = encodeURIComponent(location.hostname || 'localhost');
    url = `https://player.twitch.tv/?channel=${VID.channel}&parent=${par}&muted=false&autoplay=true`;
  }
  if (url) { vFrame.src = url; vFrame.classList.remove('hidden'); }
}

/* ══════════════════════════════════════════
   CANVAS FX
══════════════════════════════════════════ */
const canvas = document.getElementById('fx-canvas');
const ctx    = canvas.getContext('2d');
function resizeCanvas(){ canvas.width=innerWidth; canvas.height=innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

/* ── Particules ───────────────────────────── */
class Particle {
  constructor(x,y,burst=false){
    this.x = x ?? Math.random()*canvas.width;
    this.y = y ?? canvas.height+10;
    if(burst){
      const a=Math.random()*Math.PI*2, s=Math.random()*7+2;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
      this.life=1; this.decay=Math.random()*.03+.018;
      this.size=Math.random()*3+1; this.burst=true;
    } else {
      this.vx=(Math.random()-.5)*.6; this.vy=-(Math.random()*1.3+.3);
      this.life=Math.random()*.5+.15; this.decay=Math.random()*.004+.002;
      this.size=Math.random()*2.5+.5; this.burst=false;
    }
    const v=Math.floor(Math.random()*80+175);
    this.r=v; this.g=v; this.b=v;
  }
  update(){
    this.x+=this.vx; this.y+=this.vy; this.life-=this.decay;
    if(this.burst){ this.vy+=.1; this.size*=.96; }
    else { this.size*=.998; this.vx+=(Math.random()-.5)*.035; }
    return this.life>0 && this.size>.2;
  }
  draw(){
    ctx.save(); ctx.globalAlpha=Math.max(0,this.life)*.65;
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*2);
    g.addColorStop(0,`rgba(${this.r},${this.g},${this.b},1)`);
    g.addColorStop(1,`rgba(${this.r},${this.g},${this.b},0)`);
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size*2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

let particles=[];
for(let i=0;i<100;i++){ const p=new Particle(); p.y=Math.random()*canvas.height; p.life=Math.random()*.4+.05; particles.push(p); }
function spawnBurst(x,y,n=28){ for(let i=0;i<n;i++) particles.push(new Particle(x,y,true)); }

/* ── Grille ───────────────────────────────── */
let gOff=0, gInt=0;
function drawGrid(){
  const s=68;
  ctx.save();
  ctx.strokeStyle=`rgba(255,255,255,${(.022+gInt*.11).toFixed(3)})`;
  ctx.lineWidth=.5+gInt*1.5;
  for(let y=gOff%s;y<canvas.height;y+=s){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke(); }
  for(let x=gOff%s;x<canvas.width; x+=s){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke(); }
  ctx.restore();
  gOff+=.28;
}

/* ── Rings ────────────────────────────────── */
const rings=[];
function spawnRing(i){ rings.push({r:30,maxR:Math.min(canvas.width,canvas.height)*.7,life:1,speed:5+i*9}); }
function drawRings(){
  rings.forEach(rg=>{ rg.r+=rg.speed; rg.life=1-rg.r/rg.maxR; ctx.save(); ctx.strokeStyle=`rgba(255,255,255,${Math.max(0,rg.life*.38).toFixed(3)})`; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(canvas.width/2,canvas.height/2,rg.r,0,Math.PI*2); ctx.stroke(); ctx.restore(); });
  for(let i=rings.length-1;i>=0;i--) if(rings[i].life<=0) rings.splice(i,1);
}

/* ══════════════════════════════════════════
   AUDIO — getDisplayMedia (capture tab/système)
══════════════════════════════════════════ */
let audioCtx=null, analyser=null, dataArr=null, audioActive=false;
const audioDot = document.getElementById('audio-dot');
const audioBtn = document.getElementById('audio-btn');
const splashEl = document.getElementById('splash');
const splashErr= document.getElementById('splash-err');

async function activateAudio(){
  // Fermer le splash
  splashEl.classList.add('fade-out');
  setTimeout(()=>{ if(splashEl.parentNode) splashEl.remove(); }, 700);

  try {
    /* ─────────────────────────────────────────────────────────────
       getDisplayMedia :
       - Chrome/Edge : propose "Onglet / Fenêtre / Écran"
         → sélectionner l'onglet YouTube
         → cocher "Partager également le son"
       - Firefox : peut demander séparément l'audio système
       Le video:{width:1} est nécessaire sur certains navigateurs
       pour que l'audio soit bien inclus dans le stream.
    ───────────────────────────────────────────────────────────── */
    const stream = await navigator.mediaDevices.getDisplayMedia({
      video: { width:1, height:1, frameRate:1 },
      audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false }
    });

    // On n'a pas besoin de la piste vidéo
    stream.getVideoTracks().forEach(t => t.stop());

    if(stream.getAudioTracks().length === 0){
      showErr("Aucune piste audio reçue. Relance et coche 'Partager le son de l'onglet'.");
      return;
    }

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = .78;
    src.connect(analyser);
    dataArr     = new Uint8Array(analyser.frequencyBinCount);
    audioActive = true;
    audioDot.classList.add('active');
    audioBtn.textContent = '■ SON ACTIF';

    // Détection de la fin du partage par l'utilisateur
    stream.getAudioTracks()[0].onended = ()=>{
      audioActive = false;
      audioDot.classList.remove('active');
      audioBtn.textContent = '⏵ ACTIVER SON';
    };

  } catch(e){
    // Annulé par l'utilisateur → on ré-affiche le splash
    if(splashEl.parentNode === null){
      document.body.appendChild(splashEl);
      splashEl.classList.remove('fade-out');
    } else {
      splashEl.classList.remove('fade-out');
    }
    if(e.name !== 'AbortError' && e.name !== 'NotAllowedError'){
      showErr('Erreur : '+e.message);
    }
  }
}

function showErr(msg){
  splashErr.textContent = msg;
  splashErr.style.display = 'block';
}

function skipAudio(){
  splashEl.classList.add('fade-out');
  setTimeout(()=>{ if(splashEl.parentNode) splashEl.remove(); }, 700);
}

/* Lire niveau basses (bins 0-11 ≈ 0-950 Hz) */
function getBass(){
  if(!analyser || !audioActive) return 0;
  analyser.getByteFrequencyData(dataArr);
  let s=0; for(let i=0;i<11;i++) s+=dataArr[i];
  return (s/11)/255;
}

/* ── Simulation si pas d'audio ──────────────── */
let simB=0, simNext=0;
function getSimBass(t){
  const beat=60000/128;
  if(t>simNext){ simNext=t+beat+(Math.random()-.5)*beat*.08; simB=.5+Math.random()*.5; }
  simB*=.87; return simB;
}

/* ══════════════════════════════════════════
   EFFETS — réaction aux basses
══════════════════════════════════════════ */
const flashEl   = document.getElementById('flash-overlay');
const vigEl     = document.getElementById('vignette');
const nameBar   = document.getElementById('name-bar');
const bassFill  = document.getElementById('bass-fill');

let lastB=0, smooth=0, flashCD=0, ringCD=0, glitchCD=0, isGlitch=false, nameGlow=0;
const FL=.52, RG=.38, GL=.68;

function applyFX(raw,now){
  smooth = smooth*.65 + raw*.35;
  const bass = smooth;

  bassFill.style.width = (bass*100).toFixed(1)+'%';

  const gv = bass*85*SENS;
  nameGlow = nameGlow*.72 + gv*.28;
  nameEl.style.textShadow =
    `0 0 ${(nameGlow*.4).toFixed(1)}px rgba(255,255,255,.95),`+
    `0 0 ${nameGlow.toFixed(1)}px rgba(255,255,255,.4),`+
    `0 0 ${(nameGlow*2).toFixed(1)}px rgba(255,255,255,.12)`;
  nameEl.style.letterSpacing = (4+bass*20*SENS).toFixed(1)+'px';

  if(logoEl.classList.contains('visible')){
    logoEl.style.transform = `scale(${(1+bass*.22*SENS).toFixed(3)})`;
    logoEl.style.filter    = `drop-shadow(0 0 ${(bass*55*SENS).toFixed(0)}px rgba(255,255,255,.85))`;
  }

  gInt = gInt*.78 + bass*.22;
  vigEl.style.opacity = (1-bass*.28*SENS).toFixed(2);
  nameBar.style.opacity = (.25+bass*.75).toFixed(2);

  if(raw>FL && now>flashCD && raw>lastB){
    flashEl.style.opacity = Math.min((raw-FL)*3*SENS,.88).toFixed(2);
    flashCD = now+70+Math.random()*70;
    setTimeout(()=>{ flashEl.style.opacity='0'; }, 45);
  }

  if(raw>RG && now>ringCD && raw>lastB){
    spawnRing(raw);
    spawnBurst(canvas.width/2, canvas.height/2, Math.floor(raw*28*SENS));
    ringCD = now+180;
  }

  if(raw>GL && now>glitchCD && !isGlitch){
    isGlitch=true; glitchCD=now+900;
    nameEl.style.animation='glitch1 .28s steps(1) forwards';
    setTimeout(()=>{ nameEl.style.animation=''; isGlitch=false; }, 280);
  }

  lastB = raw;
}

/* ══════════════════════════════════════════
   BOUCLE PRINCIPALE
══════════════════════════════════════════ */
function loop(t){
  const raw = audioActive ? getBass() : getSimBass(t);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid();
  if(Math.random() < .35+raw*1.8) particles.push(new Particle());
  particles = particles.filter(p=>{ const a=p.update(); if(a) p.draw(); return a; });
  drawRings();
  applyFX(raw,t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ══════════════════════════════════════════
   PANNEAU CONTRÔLES — zone invisible bas-droit
   Apparaît seulement si le curseur entre dans
   la zone 120×90 pendant ≥ 500ms
══════════════════════════════════════════ */
const trigger  = document.getElementById('ctrl-trigger');
const panel    = document.getElementById('ctrl-panel');
let trigTimer  = null;
let panelOpen  = false;

function openPanel(){  panel.classList.add('visible');    panelOpen=true; }
function closePanel(){ panel.classList.remove('visible'); panelOpen=false; }

trigger.addEventListener('mouseenter', ()=>{ trigTimer=setTimeout(openPanel, 500); });
trigger.addEventListener('mouseleave', ()=>{ clearTimeout(trigTimer); });

panel.addEventListener('mouseenter', ()=>{ clearTimeout(trigTimer); openPanel(); });
panel.addEventListener('mouseleave', ()=>{ trigTimer=setTimeout(closePanel, 900); });

/* Touche H → toggle, F → fullscreen */
document.addEventListener('keydown', e=>{
  if(e.key==='h'||e.key==='H') panelOpen ? closePanel() : openPanel();
  if(e.key==='f'||e.key==='F') toggleFS();
});

/* ── Fullscreen ─────────────────────────────── */
function toggleFS(){
  if(!document.fullscreenElement)
    document.documentElement.requestFullscreen().catch(()=>{});
  else
    document.exitFullscreen().catch(()=>{});
}
document.addEventListener('dblclick', e=>{ if(e.target.tagName!=='BUTTON') toggleFS(); });

/* ── Retour config ───────────────────────────── */
function goBack(){
  if(document.fullscreenElement) document.exitFullscreen();
  if(window.opener) window.close();
  else window.location.href='index.html';
}
</script>
</body>
</html>
